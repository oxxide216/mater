<!DOCTYPE html>
<html>
  <head>
    <title>Mater Language VM</title>
    <link rel="icon" href="data:;=">
  </head>
  <body>
    <script>
      async function init() {
        const imports = {
          env: {
            print_str: (ptr, len) => {
              const bytes = new Int8Array(
                instance.exports.memory.buffer,
                ptr,
                len,
              );
              const str = new TextDecoder("utf8").decode(bytes);
              console.log(str);
            },
            print_int: (_int) => console.log(_int),
            print_float: (_float) => console.log(_float),
            print_bool: (_bool) => console.log(_bool != 0 ? "true" : "false"),
            mod_float: (a, b) => a % b,
          },
        };
        const { instance } = await WebAssembly.instantiateStreaming(
          fetch("./mater.wasm"),
          imports,
        );
        let bytecode_array = new Uint8Array(instance.exports.memory.buffer);
        const bytecode = await fetch(
          "main.mbc",
          {
            responseType: "arraybuffer",
          },
        );
        const buffer = await bytecode.arrayBuffer();
        bytecode_array.set(new Uint8Array(buffer));
        const vm = instance.exports.vm_create(bytecode_array, buffer.byteLength);
        let proc_name_array =
          new Uint8Array(instance.exports.memory.buffer, buffer.byteLength, 4);
        const encoder = new TextEncoder();
        const encoded_proc_name = encoder.encode("init");
        proc_name_array.set(encoded_proc_name);
        instance.exports.vm_run_proc_named(vm, buffer.byteLength, 4, 0);
      }
      init();
    </script>
  </body>
</html>
